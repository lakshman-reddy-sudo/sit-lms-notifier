name: LMS Notifier

on:
  workflow_dispatch:       # Manual trigger → sends ALL SEM II announcements
  schedule:
    - cron: '0 * * * *'   # Scheduled → sends only new announcements

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # Needed to commit cache.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          LMS_USER:    ${{ secrets.LMS_USER }}
          LMS_PASS:    ${{ secrets.LMS_PASS }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          # Passes "true" only when triggered manually via the Actions UI
          MANUAL_RUN:  ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python lms_bot.py

      # Only commit cache on scheduled runs.
      # Manual runs don't touch the cache so scheduled runs
      # still catch new events correctly afterwards.
      - name: Commit updated cache
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache.json
          git diff --cached --quiet || git commit -m "chore: update cache [skip ci]"
          git push
