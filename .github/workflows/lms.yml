name: LMS Notifier

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'   # Runs every hour

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit cache.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          LMS_USER: ${{ secrets.LMS_USER }}
          LMS_PASS: ${{ secrets.LMS_PASS }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python lms_bot.py

      # CRITICAL: Save cache.json back to the repo so duplicate
      # notifications aren't sent on the next run.
      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache.json
          git diff --cached --quiet || git commit -m "chore: update cache [skip ci]"
          git push
